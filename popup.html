<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minimalist Shield</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <div class="hero-row">
          <div>
            <h1>Focus Filter</h1>
            <p class="summary">Quiet utility for social media.</p>
          </div>
          <div class="theme-switch" aria-label="Appearance">
            <button class="theme-chip" data-theme="light" type="button" aria-label="Light theme" title="Light theme">
              <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4.25"></circle>
                <path d="M12 2.5v2.25M12 19.25v2.25M21.5 12h-2.25M4.75 12H2.5M18.72 5.28l-1.59 1.59M6.87 17.13l-1.59 1.59M18.72 18.72l-1.59-1.59M6.87 6.87L5.28 5.28"></path>
              </svg>
            </button>
            <button class="theme-chip" data-theme="dark" type="button" aria-label="Dark theme" title="Dark theme">
              <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 14.8A7.8 7.8 0 0 1 9.2 5a8.8 8.8 0 1 0 9.8 9.8Z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <section class="mode-list" aria-label="Protection modes">
        <button class="mode-card" data-mode="off" type="button">
          <span class="mode-name">Off</span>
          <span class="mode-copy">Show everything normally.</span>
        </button>
        <button class="mode-card" data-mode="shorts" type="button">
          <span class="mode-name">Shorts Only</span>
          <span class="mode-copy">Hide reels, shorts, and video rails.</span>
        </button>
        <button class="mode-card" data-mode="feed" type="button">
          <span class="mode-name">Feed Block</span>
          <span class="mode-copy">Keep utility, remove the main feed.</span>
        </button>
        <button class="mode-card" data-mode="search" type="button">
          <span class="mode-name">Search Only</span>
          <span class="mode-copy">Keep search, strip away discovery.</span>
        </button>
      </section>

      <p class="status" id="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
  </html>
